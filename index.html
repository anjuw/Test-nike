<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike-Inspired Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="hero">
        <h1>Welcome to Our Nike-Inspired Store</h1>
        <p>Shop the latest in athletic footwear and apparel.</p>
        <a href="#products" class="cta-button">Shop Now</a>
    </section>
    <section id="products">
        <h2>Featured Products</h2>
        <div class="product-showcase">
            <div class="product">
                <img src="product1.jpg" alt="Product 1">
                <h3>Product Title 1</h3>
                <p>$99.99</p>
            </div>
            <div class="product">
                <img src="product2.jpg" alt="Product 2">
                <h3>Product Title 2</h3>
                <p>$89.99</p>
            </div>
            <div class="product">
                <img src="product3.jpg" alt="Product 3">
                <h3>Product Title 3</h3>
                <p>$79.99</p>
            </div>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 Nike-Inspired Store. All rights reserved.</p>
    </footer>
</body>
</html>
